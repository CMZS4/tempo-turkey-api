<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo Turkey API — Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1a2332;
    --accent: #00ff88;
    --accent2: #0088ff;
    --warn: #ff4455;
    --text: #e0e8f0;
    --muted: #4a6080;
    --card: #0f1923;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(8,12,16,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .logo h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  #last-update {
    color: var(--accent);
  }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .refresh-btn:hover {
    background: rgba(0,255,136,0.1);
    border-color: var(--accent);
  }

  /* Main layout */
  main {
    padding: 32px 0;
  }

  /* Section titles */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Forex cards */
  .forex-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }

  .forex-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .forex-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .forex-card:hover {
    border-color: rgba(0,255,136,0.3);
  }

  .forex-card:hover::before {
    transform: scaleX(1);
  }

  .forex-pair {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .forex-rate {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .forex-source {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* Crypto table */
  .crypto-section {
    margin-bottom: 40px;
  }

  .crypto-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.08);
  }

  .search-input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .search-input::placeholder {
    color: var(--muted);
  }

  .table-wrapper {
    border: 1px solid var(--border);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: rgba(255,255,255,0.02);
  }

  th {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    white-space: nowrap;
  }

  th.right { text-align: right; }

  td {
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    border-bottom: 1px solid rgba(26,35,50,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td {
    background: rgba(255,255,255,0.015);
  }

  .td-right { text-align: right; }

  .coin-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .coin-rank {
    color: var(--muted);
    font-size: 10px;
    width: 24px;
    text-align: right;
  }

  .coin-symbol {
    color: var(--text);
    font-weight: 700;
    font-size: 12px;
  }

  .coin-name {
    color: var(--muted);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
  }

  .price {
    color: var(--text);
    font-weight: 700;
  }

  .change-up {
    color: var(--accent);
  }

  .change-down {
    color: var(--warn);
  }

  .market-cap {
    color: var(--muted);
  }

  /* Loading state */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
    flex-direction: column;
    gap: 16px;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Error */
  .error-msg {
    padding: 20px;
    border: 1px solid rgba(255,68,85,0.3);
    color: var(--warn);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-align: center;
  }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.03) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 768px) {
    .forex-grid { grid-template-columns: repeat(2, 1fr); }
    .status-bar { display: none; }
    .forex-rate { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <h1>TEMPO <span>TURKEY</span> API</h1>
    </div>
    <div class="status-bar">
      <span>KAYNAK: TCMB + COINGECKO</span>
      <span>GÜNCELLEME: <span id="last-update">—</span></span>
      <button class="refresh-btn" onclick="loadAll()">↻ YENİLE</button>
    </div>
  </header>

  <main>
    <!-- Forex -->
    <div class="section-header">
      <span class="section-title">Döviz Kurları</span>
      <div class="section-line"></div>
      <span class="section-count">TCMB BANKNOT SATIŞ</span>
    </div>

    <div class="forex-grid" id="forex-grid">
      <div class="forex-card">
        <div class="forex-pair">USD / TRY</div>
        <div class="forex-rate skeleton" style="height:34px;width:120px;">&nbsp;</div>
      </div>
      <div class="forex-card">
        <div class="forex-pair">EUR / TRY</div>
        <div class="forex-rate skeleton" style="height:34px;width:120px;">&nbsp;</div>
      </div>
      <div class="forex-card">
        <div class="forex-pair">GBP / TRY</div>
        <div class="forex-rate skeleton" style="height:34px;width:120px;">&nbsp;</div>
      </div>
      <div class="forex-card">
        <div class="forex-pair">JPY / TRY</div>
        <div class="forex-rate skeleton" style="height:34px;width:120px;">&nbsp;</div>
      </div>
    </div>

    <!-- Crypto -->
    <div class="section-header">
      <span class="section-title">Kripto Piyasası</span>
      <div class="section-line"></div>
      <span class="section-count" id="crypto-count">—</span>
    </div>

    <div class="crypto-section">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
        <div class="crypto-filters">
          <button class="filter-btn active" onclick="filterCoins('all', this)">TÜMÜ</button>
          <button class="filter-btn" onclick="filterCoins('up', this)">↑ YUKARI</button>
          <button class="filter-btn" onclick="filterCoins('down', this)">↓ AŞAĞI</button>
        </div>
        <input class="search-input" type="text" placeholder="KOİN ARA..." oninput="searchCoins(this.value)" />
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>KOİN</th>
              <th class="right">FİYAT (USD)</th>
              <th class="right">24S DEĞİŞİM</th>
              <th class="right">PİYASA DEĞERİ</th>
              <th class="right">HACİM (24S)</th>
            </tr>
          </thead>
          <tbody id="crypto-tbody">
            <tr><td colspan="6"><div class="loading"><div class="loading-spinner"></div><div class="loading-text">VERİ YÜKLENİYOR...</div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
 const API = window.location.origin;
  let allCoins = [];
  let currentFilter = 'all';

  function fmt(n, decimals = 2) {
    if (n == null) return '—';
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    if (n >= 1) return '$' + n.toFixed(4);
    return '$' + n.toFixed(6);
  }

  function fmtPrice(n) {
    if (n == null) return '—';
    if (n >= 1000) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (n >= 1) return '$' + n.toFixed(4);
    if (n >= 0.01) return '$' + n.toFixed(5);
    return '$' + n.toFixed(8);
  }

  function fmtTRY(n) {
    if (n == null) return '—';
    return n.toFixed(4);
  }

  async function loadForex() {
    try {
      const res = await fetch(API + '/rates/forex');
      const data = await res.json();
      const r = data.rates;
      document.getElementById('forex-grid').innerHTML = `
        <div class="forex-card">
          <div class="forex-pair">USD / TRY</div>
          <div class="forex-rate">${fmtTRY(r.USD_TRY)}</div>
          <div class="forex-source">TCMB BANKNOT SATIŞ</div>
        </div>
        <div class="forex-card">
          <div class="forex-pair">EUR / TRY</div>
          <div class="forex-rate">${fmtTRY(r.EUR_TRY)}</div>
          <div class="forex-source">TCMB BANKNOT SATIŞ</div>
        </div>
        <div class="forex-card">
          <div class="forex-pair">GBP / TRY</div>
          <div class="forex-rate">${fmtTRY(r.GBP_TRY)}</div>
          <div class="forex-source">TCMB BANKNOT SATIŞ</div>
        </div>
        <div class="forex-card">
          <div class="forex-pair">JPY / TRY</div>
          <div class="forex-rate">${fmtTRY(r.JPY_TRY)}</div>
          <div class="forex-source">TCMB BANKNOT SATIŞ</div>
        </div>
      `;
    } catch (e) {
      document.getElementById('forex-grid').innerHTML = '<div class="error-msg" style="grid-column:1/-1">TCMB VERİSİ ALINAMADI</div>';
    }
  }

  async function loadCrypto() {
    try {
      const res = await fetch(API + '/rates/crypto');
      const data = await res.json();
      allCoins = data.coins;
      document.getElementById('crypto-count').textContent = `TOP ${allCoins.length} KOİN`;
      renderTable(allCoins);
    } catch (e) {
      document.getElementById('crypto-tbody').innerHTML = '<tr><td colspan="6"><div class="error-msg">KRİPTO VERİSİ ALINAMADI</div></td></tr>';
    }
  }

  function renderTable(coins) {
    if (!coins.length) {
      document.getElementById('crypto-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted);font-family:Space Mono,monospace;font-size:12px;">SONUÇ BULUNAMADI</td></tr>';
      return;
    }

    document.getElementById('crypto-tbody').innerHTML = coins.map((c, i) => {
      const changeClass = c.change_24h >= 0 ? 'change-up' : 'change-down';
      const changeSign = c.change_24h >= 0 ? '+' : '';
      const change = c.change_24h != null ? `${changeSign}${c.change_24h.toFixed(2)}%` : '—';
      return `
        <tr>
          <td><span class="coin-rank">${i + 1}</span></td>
          <td>
            <div class="coin-info">
              <span class="coin-symbol">${c.symbol}</span>
              <span class="coin-name">${c.name}</span>
            </div>
          </td>
          <td class="td-right price">${fmtPrice(c.price_usd)}</td>
          <td class="td-right ${changeClass}">${change}</td>
          <td class="td-right market-cap">${fmt(c.market_cap)}</td>
          <td class="td-right market-cap">${fmt(c.volume_24h)}</td>
        </tr>
      `;
    }).join('');
  }

  function filterCoins(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let filtered = [...allCoins];
    if (type === 'up') filtered = filtered.filter(c => c.change_24h >= 0);
    if (type === 'down') filtered = filtered.filter(c => c.change_24h < 0);
    renderTable(filtered);
  }

  function searchCoins(query) {
    const q = query.toLowerCase();
    let filtered = allCoins.filter(c =>
      c.symbol.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
    );
    if (currentFilter === 'up') filtered = filtered.filter(c => c.change_24h >= 0);
    if (currentFilter === 'down') filtered = filtered.filter(c => c.change_24h < 0);
    renderTable(filtered);
  }

  async function loadAll() {
    document.getElementById('last-update').textContent = 'YÜKLENİYOR...';
    await Promise.all([loadForex(), loadCrypto()]);
    const now = new Date();
    document.getElementById('last-update').textContent =
      now.toLocaleTimeString('tr-TR');
  }

  loadAll();
  setInterval(loadAll, 60000); // Her dakika otomatik güncelle
</script>
</body>
</html>
